# Alembic 数据库迁移配置

[alembic]
# 迁移脚本路径
script_location = alembic

# 数据库连接字符串（从环境变量读取）
# sqlalchemy.url = driver://user:pass@localhost/dbname

# 迁移文件命名模板
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s

# 输出编码
output_encoding = utf-8

# 是否在迁移前执行在线检查
# truncate_slug_length = 40

# 是否使用 Alembic 的 timestamp 作为版本号
# version_locations = %(here)s/bar %(here)s/bat

# 是否回退到递增版本号
# version_path_separator = :

# 模板目录
# template_scripts_location = alembic/templates

# 是否显示 SQL
# echo = false

# 是否使用事务
# transaction_per_migration = false

[post_write_hooks]
# 格式化迁移文件
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
